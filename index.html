    <!--
      AMAZON PLATFORM BRIDGE
      The Amazon WebView wrapper injects window.APP_PLATFORM = "amazon" before this page loads.
      It also injects window.AmazonIAP for in-app purchase callbacks.
      No extra script needed here — platform.js reads window.APP_PLATFORM at runtime.
    -->
    <script>
      // Prevent double-tap zoom on Amazon Fire tablets
      var lastTouchEnd = 0;
      document.addEventListener('touchend', function(e) {
        var now = Date.now();
        if (now - lastTouchEnd <= 300) { e.preventDefault(); }
        lastTouchEnd = now;
      }, { passive: false });

      // Hardware back button support for Amazon Fire tablets
      document.addEventListener('backbutton', function(e) {
        e.preventDefault();
        if (window.history.length > 1) {
          window.history.back();
        }
      }, false);
    </script>
  </head>

  </body>
